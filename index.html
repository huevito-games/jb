<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botones de Navegación</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .btn {
            display: inline-block;
            padding: 15px 25px;
            margin: 10px;
            font-size: 18px;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Mi página de botones</h1>

    <!-- Botones -->
    <a href="https://www.google.com" class="btn" target="_blank">Google</a>
    <a href="https://www.wikipedia.org" class="btn" target="_blank">Wikipedia</a>

    <!-- Más botones se agregan aquí fácilmente -->
    <!-- <a href="URL" class="btn" target="_blank">Nombre del botón</a> -->

</body>
</html>
